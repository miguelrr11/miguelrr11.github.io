name: Actualizar manual ProcRoadv2

on:
  push:
    branches: [main]
    paths:
      - 'Algorithms/ProcRoadv2/**'
      - '!Algorithms/ProcRoadv2/manual.md'

jobs:
  update-manual:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (último commit + padre)
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Calcular diff del último commit
        id: diff
        run: |
          diff_content=$(git diff HEAD~1 HEAD -- 'Algorithms/ProcRoadv2/' \
            ':(exclude)Algorithms/ProcRoadv2/manual.md')
          {
            echo 'diff<<DIFF_EOF'
            echo "$diff_content"
            echo 'DIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Ejecutar Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          working-directory: Algorithms/ProcRoadv2
          sandbox: workspace-write
          model: gpt-5.4-mini
          effort: low
          prompt: |
            Diff del último commit en Algorithms/ProcRoadv2 (manual.md excluido):

            ${{ steps.diff.outputs.diff }}

            Lee manual.md (en el directorio actual) y actualizalo segun lo siguiente:

            NO toques manual.md si los cambios son:
               - Refactors internos sin cambio de comportamiento externo
               - Formateo, comentarios, renombrados de variables locales
               - Cambios en tests
               - Correcciones de bugs no documentados
               - Cambios menores que no se contemplan en el manual

            SÍ actualiza manual.md si los cambios incluyen:
               - Funciones o métodos o clases nuevos relevantes
               - Cambios en el comportamiento observable de algo documentado
               - Cambios en formatos de entrada/salida descritos en el manual
               - Eliminación o renombrado de funcionalidades documentadas

            Ante la duda, no cambies. El único archivo que puedes modificar
            es manual.md.

      - name: Commit y push directo si manual.md cambió
        run: |
          cd Algorithms/ProcRoadv2
          if git diff --quiet -- manual.md; then
            echo "manual.md no ha cambiado, nada que commitear."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manual.md
          git commit -m "docs(ProcRoadv2): actualizar manual tras ${{ github.sha }} [skip ci]"
          git push origin HEAD:main